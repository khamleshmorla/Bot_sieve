<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#0a0f1a"/>
  <!-- Shield -->
  <path d="M32 6 L52 14 L52 34 C52 46 32 58 32 58 C32 58 12 46 12 34 L12 14 Z"
        fill="none" stroke="hsl(185,100%,50%)" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Bot face -->
