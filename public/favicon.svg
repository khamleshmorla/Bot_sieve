  <!-- Eyes -->
  <rect x="26" y="27" width="4" height="4" rx="1" fill="hsl(185,100%,50%)"/>
  <rect x="34" y="27" width="4" height="4" rx="1" fill="hsl(185,100%,50%)"/>
  <!-- Mouth -->
  <rect x="27" y="34" width="10" height="2" rx="1" fill="hsl(185,100%,50%)" fill-opacity="0.7"/>
  <!-- Antenna -->
  <line x1="32" y1="22" x2="32" y2="17" stroke="hsl(185,100%,50%)" stroke-width="1.5"/>
  <circle cx="32" cy="16" r="2" fill="hsl(185,100%,50%)"/>
  <!-- Signal dots -->
  <circle cx="47" cy="20" r="1.5" fill="hsl(185,100%,50%)" opacity="0.9"/>
  <circle cx="47" cy="27" r="1.5" fill="hsl(185,100%,50%)" opacity="0.6"/>
  <circle cx="47" cy="34" r="1.5" fill="hsl(185,100%,50%)" opacity="0.3"/>
</svg>
